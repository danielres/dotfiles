
# GLOBAL ======================================================================

general {
  gaps_in             = 0
  gaps_out            = 3
  border_size         = 2
  col.active_border   = $col_window_border_active
  col.inactive_border = $col_window_border_inactive
}

decoration {
  rounding            = 5

  blur {
    enabled           = true
    ignore_opacity    = true
    passes            = 3
    size              = 6
  }
}

animations {
  enabled             = true
  animation           = windows,    1, 1.1, default
  animation           = border,     1, 1.1, default
  animation           = fade,       1, 1.1, default
  animation           = workspaces, 1, 1.1, default
}

# LAYER RULES =================================================================

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

layerrule {
  name = fuzzel
  match:namespace = fuzzel
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

# WINDOW RULES ================================================================

# windowrule   = idle_inhibit fullscreen, match:class:.*
# windowrule = match:fullscreen_state_client 1, idle_inhibit always

windowrule = match:fullscreen_state_client 1, border_color $col_window_border_fullscreen
windowrule = match:fullscreen_state_client 1, border_size 2

$floating  = (Oklch Color Picker|Calculator|Volume Control|Bluetooth Devices)
windowrule = match:title $floating, float 1
windowrule = match:title $floating, size 800 500


