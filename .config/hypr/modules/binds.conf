# VARS ========================================================================

$mod                = SUPER
$makima             = CTRL ALT SHIFT SUPER # emitted by makima when pressing KEY_RIGHTCTRL

$dir_dotfiles       = ~/dotfiles
$dir_scripts        = $dir_dotfiles/.config/hypr/scripts
$dir_vim            = $dir_dotfiles/.config/vim-kickstart-modular

$cmd_lock_session   = noctalia-shell ipc call sessionMenu lock
$cmd_move_to_desk   = $dir_scripts/move-to-desk-preserve-slot
$cmd_pick_color     = hyprpicker | xargs wl-copy
$cmd_switch_to_desk = $dir_scripts/switch-to-desk

$app_browser        = firefox -P default
$app_browser_priv   = firefox -P default --private-window
$app_bt             = blueman-manager
$app_clipboard      = noctalia-shell ipc call launcher clipboard
$app_clipboard_2    = cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
$app_explorer       = nautilus
$app_launcher       = noctalia-shell ipc call launcher toggle
$app_launcher_2     = fuzzel
$app_music          = pear-desktop
$app_notifications  = noctalia-shell ipc call notifications toggleHistory
$app_pdf            = zathura
$app_projects       = jsonmenu projects
$app_session        = noctalia-shell ipc call sessionMenu toggle
$app_terminal       = wezterm
$app_volume         = noctalia-shell ipc call volume togglePanel
$app_volume_2       = pavucontrol

# LAPTOP ======================================================================

bindl =, switch:Lid Switch, exec, $cmd_lock_session

# MOUSE =======================================================================

$click_l = mouse:272
$click_r = mouse:273
$click_m = mouse:274
bindm = $mod, $click_l, movewindow
bindm = $mod, $click_r, resizewindow
bindm = $mod, $click_m, resizewindow

# LEFT/RIGHT/UP/DOWN ==========================================================

bind = $mod CTRL, h, sendshortcut, , left,
bind = $mod CTRL, l, sendshortcut, , right,
bind = $mod CTRL, k, sendshortcut, , up,
bind = $mod CTRL, j, sendshortcut, , down,

# WINDOWS + GROUPS + WORKSPACES ===============================================

# prioritize cycling within the current group before 
# moving focus to windows outside the group:
# binds:movefocus_cycles_groupfirst = true

bind = $mod,       G, togglegroup
bind = $mod SHIFT, G, lockactivegroup, toggle
bind = $mod CTRL,  H, changegroupactive, b  # Previous tab
bind = $mod CTRL,  L, changegroupactive, f # Next tab

bind = $mod,       H, movefocus, l
bind = $mod,       L, movefocus, r
bind = $mod,       K, movefocus, u
bind = $mod,       J, movefocus, d
bind = $mod SHIFT, H, movewindoworgroup, l
bind = $mod SHIFT, L, movewindoworgroup, r
bind = $mod SHIFT, K, movewindoworgroup, u
bind = $mod SHIFT, J, movewindoworgroup, d

bind = $mod,       F, fullscreen, 0
bind = $mod,       M, fullscreen, 1
bind = $mod,       Z, togglefloating
bind = $mod,       Z, centerwindow
bind = $mod SHIFT, Z, cyclenext, float

# kill + reload
bind = $mod,       Q, killactive,
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod,       R, exec, sleep 1; notify-send "Reloaded"
bind = $mod,       I, exec, $app_notifications
# workspaces
bind = $mod, 1, exec, $cmd_switch_to_desk 1
bind = $mod, 2, exec, $cmd_switch_to_desk 2
bind = $mod, 3, exec, $cmd_switch_to_desk 3
bind = $mod, 4, exec, $cmd_switch_to_desk 4
bind = $mod, 5, exec, $cmd_switch_to_desk 5
bind = $mod, 6, exec, $cmd_switch_to_desk 6
bind = $mod, 7, exec, $cmd_switch_to_desk 7

bind = $mod SHIFT, 1, exec, $cmd_move_to_desk 1
bind = $mod SHIFT, 2, exec, $cmd_move_to_desk 2
bind = $mod SHIFT, 3, exec, $cmd_move_to_desk 3
bind = $mod SHIFT, 4, exec, $cmd_move_to_desk 4
bind = $mod SHIFT, 5, exec, $cmd_move_to_desk 5
bind = $mod SHIFT, 6, exec, $cmd_move_to_desk 6
bind = $mod SHIFT, 7, exec, $cmd_move_to_desk 7
bind = $mod,       8, togglespecialworkspace, music
bind = $mod SHIFT, 8, movetoworkspacesilent,  special:music
bind = $mod,       0, togglespecialworkspace, minimized
bind = $mod SHIFT, 0, movetoworkspacesilent,  special:minimized
bind = $mod,       9, togglespecialworkspace, obsidian
bind = $mod,       P, exec, hypr-pull-window

bind = $mod,       period, exec, bash -lc 'n=$(hyprctl -j monitors | jq length); for ((i=0;i<n;i++)); do hyprctl dispatch workspace +$n; hyprctl dispatch focusmonitor +1; done'
bind = $mod,       comma,  exec, bash -lc 'n=$(hyprctl -j monitors | jq length); for ((i=0;i<n;i++)); do hyprctl dispatch workspace -$n; hyprctl dispatch focusmonitor +1; done'
bind = $mod SHIFT, period, exec, bash -lc 'n=$(hyprctl -j monitors | jq length); hyprctl dispatch movetoworkspacesilent +$n'
bind = $mod SHIFT, comma,  exec, bash -lc 'n=$(hyprctl -j monitors | jq length); hyprctl dispatch movetoworkspacesilent -$n'
bind = $mod CTRL,  period, exec, bash -lc 'n=$(hyprctl -j monitors | jq length); hyprctl dispatch movetoworkspace +$n'
bind = $mod CTRL,  comma,  exec, bash -lc 'n=$(hyprctl -j monitors | jq length); hyprctl dispatch movetoworkspace -$n'

# window resizing
binde  = $mod CTRL, h, resizeactive, -80   0
binde  = $mod CTRL, l, resizeactive,  80   0
binde  = $mod CTRL, k, resizeactive,   0 -80
binde  = $mod CTRL, j, resizeactive,   0  80

# MEDIA BUTTONS

# Screenshots
bind =,       Print, exec, sh -lc 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/$(date +%F_%T).png"; grim "$file" && wl-copy < "$file" && notify-send "Screenshot" "Saved to $file and copied to clipboard" --action="Open" && sleep 0.1 && xdg-open "$file" &'
bind = SHIFT, Print, exec, sh -lc 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/$(date +%F_%T).png"; slurp | grim -g - "$file" && wl-copy < "$file" && notify-send "Screenshot" "Saved to $file and copied to clipboard" --action=:"Open" && sleep 0.1 && xdg-open "$file" &'

# Volume 
binde =,       XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
binde =,       XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind  =,       XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = SHIFT, XF86AudioMute,        exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

# Brightness
bind  = ALT, XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind  = ALT, XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind  =,     XF86MonBrightnessDown, exec, ddcutil --display 2 setvcp 10 - 20
bind  =,     XF86MonBrightnessUp,   exec, ddcutil --display 2 setvcp 10 + 20

# Media
bind  =, XF86AudioPlay, exec, playerctl play-pause
bind  =, XF86AudioNext, exec, playerctl next
bind  =, XF86AudioPrev, exec, playerctl previous

# APPS ========================================================================
  bind  = $mod,       XF86AudioLowerVolume, exec, $app_volume_2
  bind  = $mod,       XF86AudioRaiseVolume, exec, $app_volume
# bindr = $mod,       SUPER_L,              exec, sh -c 'pkill -x fuzzel || (fuzzel >/dev/null 2>&1 &)'
  bindr = $mod,       SUPER_L,              exec, $app_launcher
  bind  = $mod,       C,                    exec, $cmd_pick_color
  bind  = $mod,       D,                    exec, $app_launcher_2
  bind  = $mod,       E,                    exec, $app_explorer
  bind  = $mod,       O,                    exec, $app_session
# bind  = $mod SHIFT, O,                    exec, jsonmenu system
  bind  = $mod SHIFT, P,                    exec, $app_projects
  bind  = $mod,       V,                    exec, $app_clipboard
  bind  = $mod SHIFT, V,                    exec, $app_clipboard_2
  bind  = $mod,       T,                    exec, $app_terminal
# bind  = $mod,       X,                    overview:toggle, toggle

# MAKIMA =====================================================================

$cmd_neovide  = direnv allow; direnv exec . neovide
bind = $makima, t, exec, $app_terminal
bind = $makima, h, exec, notify-send "<b>d</b>otfiles" "n<b>v</b>im config"
bind = $makima, d, exec, cd $dir_dotfiles; $cmd_neovide
bind = $makima, v, exec, cd $dir_vim;      $cmd_neovide

# QUICKLAUNCH SUBMAP ==========================================================

bind   = $mod, space, exec,   hyprctl keyword input:follow_mouse 1
bind   = $mod, space, exec,   notify-send " ✅ quicklaunch submap: on"
bind   = $mod, space, submap, quicklaunch
submap = quicklaunch

bind   =,       t, exec, $app_terminal     & $resetSubMap
bind   =,       b, exec, $app_bt           & $resetSubMap
bind   =,       e, exec, $app_explorer     & $resetSubMap
bind   =,       m, exec, $app_music        & $resetSubMap
bind   =,       o, exec, $app_pdf          & $resetSubMap
bind   =,       w, exec, $app_browser      & $resetSubMap
bind   = SHIFT, w, exec, $app_browser_priv & $resetSubMap
# bind   = $mod,  mouse:274, killactive

bind   =$mod, q,      exec,   $resetSubMap
bind   =$mod, q,      exec,   hyprctl keyword input:follow_mouse 2
bind   =$mod, q,      exec,   notify-send " ❌ quicklaunch submap: off"
bind   =$mod, q,      submap, reset
bind   =,     escape, exec,   $resetSubMap
bind   =,     escape, exec,   hyprctl keyword input:follow_mouse 2
bind   =,     escape, exec,   notify-send " ❌ quicklaunch submap: off"
bind   =,     escape, submap, reset
submap = reset

